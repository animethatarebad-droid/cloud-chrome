name: Cloud Chrome iOS12

on:
  workflow_dispatch:

jobs:
  cloudpc:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Update system
      run: |
        sudo apt update

    - name: Install desktop and VNC
      run: |
        sudo apt install -y xfce4 xfce4-goodies dbus-x11
        sudo apt install -y xvfb x11vnc novnc websockify
        sudo apt install -y wget curl

    - name: Install Chrome
      run: |
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb

    - name: Start virtual display
      run: |
        export DISPLAY=:1
        Xvfb :1 -screen 0 1920x1080x24 &
        sleep 3

    - name: Start XFCE desktop
      run: |
        export DISPLAY=:1
        startxfce4 &
        sleep 5

    - name: Start VNC server
      run: |
        export DISPLAY=:1
        x11vnc -display :1 -nopw -forever -shared -rfbport 5900 &

    - name: Start noVNC (legacy compatible)
      run: |
        websockify --web=/usr/share/novnc/ 6080 localhost:5900 &

    - name: Install Cloudflare tunnel
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

    - name: Start tunnel
      run: |
        cloudflared tunnel --url http://localhost:6080 > tunnel.txt 2>&1 &
        sleep 20

    - name: Print public URL
      run: |
        grep trycloudflare tunnel.txt

    - name: Launch Chrome
      run: |
        export DISPLAY=:1
        google-chrome \
        --no-sandbox \
        --disable-dev-shm-usage \
        --autoplay-policy=no-user-gesture-required \
        --start-maximized &

    - name: Keep runner alive
      run: |
        while true
        do
          sleep 300
        done
