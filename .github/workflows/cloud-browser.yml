name: Cloud Chrome PC

on:
  workflow_dispatch:

jobs:
  cloud-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Starting runner
      run: |
        echo "Starting Cloud Chrome PC..."

    - name: Install desktop environment
      run: |
        sudo apt update

        sudo apt install -y \
        xfce4 \
        xfce4-goodies \
        xfce4-terminal \
        dbus-x11 \
        xvfb \
        x11vnc \
        novnc \
        websockify \
        curl \
        wget \
        unzip \
        pulseaudio \
        pavucontrol \
        firefox

    - name: Install Google Chrome
      run: |
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb

    - name: Setup display
      run: |
        export DISPLAY=:1
        Xvfb :1 -screen 0 1920x1080x24 &

    - name: Start XFCE desktop
      run: |
        export DISPLAY=:1
        startxfce4 &

    - name: Start VNC server
      run: |
        export DISPLAY=:1
        x11vnc -display :1 -nopw -forever -shared -rfbport 5900 &

    - name: Start noVNC web client
      run: |
        websockify --web=/usr/share/novnc/ 6080 localhost:5900 &

    - name: Install Cloudflare Tunnel
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

    - name: Start public tunnel
      run: |
        cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
        sleep 20

    - name: Print public URL
      run: |
        echo "YOUR CLOUD BROWSER LINK:"
        cat tunnel.log | grep trycloudflare.com

    - name: Launch Chrome automatically
      run: |
        export DISPLAY=:1
        google-chrome --no-sandbox --disable-dev-shm-usage &

    - name: Keep session alive
      run: |
        echo "Cloud PC running..."
        while true
        do
          sleep 300
        done
