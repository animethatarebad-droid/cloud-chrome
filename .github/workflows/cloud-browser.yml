name: Cloud Chrome iOS12

on:
  workflow_dispatch:

jobs:
  cloudpc:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Update system
      run: |
        sudo apt update

    - name: Install desktop
      run: |
        sudo apt install -y xfce4 xfce4-goodies dbus-x11

    - name: Install VNC + noVNC
      run: |
        sudo apt install -y xvfb x11vnc novnc websockify wget curl

    - name: Install Chrome (reliable repo method)
      run: |
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Start virtual display
      run: |
        export DISPLAY=:1
        Xvfb :1 -screen 0 1920x1080x24 &
        sleep 3

    - name: Start XFCE desktop
      run: |
        export DISPLAY=:1
        startxfce4 &
        sleep 5

    - name: Start VNC server
      run: |
        export DISPLAY=:1
        x11vnc -display :1 -nopw -forever -shared -rfbport 5900 &

    - name: Start noVNC
      run: |
        websockify --web=/usr/share/novnc/ 6080 localhost:5900 &

    - name: Install Cloudflare tunnel
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

    - name: Start Cloudflare tunnel
      run: |
        cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
        sleep 25

    - name: Print cloud PC link
      run: |
        grep trycloudflare tunnel.log

    - name: Launch Chrome optimized for streaming
      run: |
        export DISPLAY=:1
        google-chrome \
        --no-sandbox \
        --disable-dev-shm-usage \
        --autoplay-policy=no-user-gesture-required \
        --start-maximized \
        --enable-accelerated-video-decode \
        --enable-gpu-rasterization &

    - name: Keep runner alive
      run: |
        while true
        do
          sleep 300
        done
